<!DOCTYPE html>
<html>
<head>
<title>Exam OS</title>
<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

#timer {
    font-size: 50px;
    margin-top: 20%;
}

.flash {
    animation: flash 0.1s infinite;
}

@keyframes flash {
    0% { background: white; color: black; }
    50% { background: black; color: white; }
    100% { background: white; color: black; }
}
</style>
</head>

<body>

<h1>Exam OS</h1>
<div id="timer">Loading...</div>

<audio id="lms" src="lms.mp3"></audio>
<audio id="boom" src="flashbang.mp3"></audio>

<script>
let end = new Date();
end.setMinutes(end.getMinutes() + 120);

let lmsPlayed = false;
let boomPlayed = false;

function update() {
    let now = new Date();
    let diff = end - now;

    let seconds = Math.floor(diff / 1000);

    if (seconds <= 0 && !boomPlayed) {
        boomPlayed = true;
        document.body.classList.add("flash");
        document.getElementById("boom").play();
        document.body.innerHTML = "<h1>FREEDOM UNLOCKED</h1>";
        return;
    }

    if (seconds <= 110 && !lmsPlayed) {
        lmsPlayed = true;
        document.getElementById("lms").play();
    }

    document.getElementById("timer").innerText = seconds + "s left";
}

setInterval(update, 1000);
</script>

</body>
</html>
