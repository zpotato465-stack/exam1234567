<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam OS</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

#container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#timer {
    font-size: 50px;
    margin-top: 20px;
}

.flash {
    animation: flash 0.1s infinite;
}

@keyframes flash {
    0% { background: white; color: black; }
    50% { background: black; color: white; }
    100% { background: white; color: black; }
}
</style>
</head>

<body>

<div id="container">
    <h1>Exam OS</h1>
    <div id="timer">Loading...</div>
</div>

<audio id="lms" src="lms.mp3"></audio>
<audio id="boom" src="flashbang.mp3"></audio>

<script>
// 🎯 SET YOUR REAL EXAM DATE HERE
let end = new Date("March 23, 2026 14:00:00");

let lmsPlayed = false;
let boomPlayed = false;

function update() {

    let now = new Date();
    let diff = end - now;

    if (diff <= 0 && !boomPlayed) {
        boomPlayed = true;

        document.body.classList.add("flash");
        document.getElementById("boom").play();

        document.getElementById("container").innerHTML =
            "<h1>💥 FREEDOM UNLOCKED 💥</h1>";

        return;
    }

    let totalSeconds = Math.floor(diff / 1000);

    let days = Math.floor(totalSeconds / 86400);
    let hours = Math.floor((totalSeconds % 86400) / 3600);
    let minutes = Math.floor((totalSeconds % 3600) / 60);
    let seconds = totalSeconds % 60;

    // 🎵 LMS at 1:50 remaining (110 seconds)
    if (totalSeconds <= 110 && !lmsPlayed) {
        lmsPlayed = true;
        document.getElementById("lms").play();
    }

    document.getElementById("timer").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(update, 1000);
</script>

</body>
</html>
